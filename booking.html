<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book an Appointment — ClinicOS</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
  <!-- Supabase CDN (UMD build sets window.supabase globally) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    body { background:var(--bg); min-height:100vh; padding:32px 16px; }
    .booking-wrap { max-width:640px; margin:0 auto; }
    .booking-header { text-align:center; margin-bottom:36px; }
    .booking-header .bh-logo {
      width:72px; height:72px; background:var(--teal); border-radius:22px;
      display:flex; align-items:center; justify-content:center; font-size:32px;
      margin:0 auto 16px; box-shadow:0 8px 24px rgba(13,115,119,0.3);
    }
    .booking-header h1 { font-family:'Playfair Display',serif; font-size:30px; color:var(--ink); margin-bottom:6px; }
    .booking-header p { color:var(--ink3); font-size:14px; }
    .doctor-card {
      border:2px solid var(--border); border-radius:12px; padding:16px;
      cursor:pointer; transition:var(--transition); background:var(--surface);
      display:flex; align-items:center; gap:12px;
    }
    .doctor-card:hover { border-color:var(--teal); background:var(--teal-light); }
    .doctor-card.selected { border-color:var(--teal); background:var(--teal-light); box-shadow:0 0 0 3px rgba(13,115,119,0.15); }
    .service-card {
      border:1.5px solid var(--border); border-radius:10px; padding:12px 14px;
      cursor:pointer; transition:var(--transition); background:var(--surface);
      display:flex; align-items:center; justify-content:space-between;
    }
    .service-card:hover { border-color:var(--teal); }
    .service-card.selected { border-color:var(--teal); background:var(--teal-light); }
    .confirm-box { background:var(--teal-light); border:2px solid var(--teal-mid); border-radius:14px; padding:20px; }
    .confirm-row { display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--teal-mid); font-size:13px; }
    .confirm-row:last-child { border-bottom:none; }
    .confirm-row .ck { color:var(--teal); }
    .confirm-row .cv { font-weight:700; color:var(--teal); }
    .success-screen { text-align:center; padding:48px 24px; }
    .success-screen .si { font-size:72px; margin-bottom:20px; }
    .success-screen h2 { font-family:'Playfair Display',serif; font-size:28px; color:var(--ink); margin-bottom:8px; }
    .success-screen p { color:var(--ink3); font-size:15px; line-height:1.6; max-width:400px; margin:0 auto; }
  </style>
</head>
<body>

<div class="booking-wrap">

  <!-- Header -->
  <div class="booking-header">
    <div class="bh-logo">🏥</div>
    <h1 id="clinicTitle">Book an Appointment</h1>
    <p>No account needed. We'll call to confirm your booking.</p>
  </div>

  <!-- Step Indicator -->
  <div class="steps" id="stepsBar">
    <div class="step active" id="step-1">
      <div class="step-circle">1</div>
      <div class="step-label">Branch & Service</div>
    </div>
    <div class="step" id="step-2">
      <div class="step-circle">2</div>
      <div class="step-label">Doctor & Date</div>
    </div>
    <div class="step" id="step-3">
      <div class="step-circle">3</div>
      <div class="step-label">Your Details</div>
    </div>
  </div>

  <!-- Main Content Area -->
  <div id="bookContent"></div>

</div><!-- /.booking-wrap -->

<div class="toast-stack" id="toastStack"></div>

<script src="js/config.js"></script>
<script>
// ─── Booking State ────────────────────────────────
const bk = {
  step:        1,
  branchId:    null,
  branchName:  null,
  procedureId: null,
  procedure:   null,
  doctorId:    null,
  doctor:      null,
  date:        new Date().toISOString().split('T')[0],
  time:        null,
  customerName:  '',
  customerPhone: '',
  customerNotes: ''
};

let _bkBranches   = [];
let _bkProcedures = [];
let _bkDoctors    = [];
let _bkBookedSlots = [];

// ─── Boot ─────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  _bkBranches = await loadBranches();
  if (_bkBranches.length === 1) {
    bk.branchId   = _bkBranches[0].id;
    bk.branchName = _bkBranches[0].name;
    document.getElementById('clinicTitle').textContent = _bkBranches[0].name;
    await loadBranchData();
  }
  renderBookStep();
});

async function loadBranches() {
  const { data } = await supabase.from('branches').select('*').order('name');
  return data || [];
}

async function loadBranchData() {
  const [{ data: procs }, { data: docs }] = await Promise.all([
    supabase.from('procedures').select('*').eq('active', true).eq('branch_id', bk.branchId).order('name'),
    supabase.from('profiles').select('id,name,name_ar').eq('role','doctor').eq('branch_id',bk.branchId).eq('active',true).order('name')
  ]);
  _bkProcedures = procs || [];
  _bkDoctors    = docs  || [];
}

async function loadBookedSlots() {
  if (!bk.doctorId || !bk.date) { _bkBookedSlots = []; return; }
  const { data } = await supabase.from('appointments')
    .select('time').eq('doctor_id', bk.doctorId).eq('date', bk.date)
    .in('status', ['pending','confirmed']);
  _bkBookedSlots = (data||[]).map(r => r.time?.slice(0,5));
}

// ─── Render booking wizard ────────────────────────
async function renderBookStep() {
  // Update step indicators
  for (let i = 1; i <= 3; i++) {
    const el = document.getElementById(`step-${i}`);
    if (!el) continue;
    el.className = 'step' + (i < bk.step ? ' done' : i === bk.step ? ' active' : '');
  }

  const content = document.getElementById('bookContent');

  if (bk.step === 1) {
    // ── Step 1: Branch (if >1) + Service ──────────
    content.innerHTML = `
      <div class="card">
        <div class="card-header"><div class="card-title">Choose a Service</div></div>
        <div class="card-body">
          ${_bkBranches.length > 1 ? `
          <div class="field">
            <label>Branch / Location</label>
            <select id="bkBranch" onchange="selectBranch(this.value)">
              <option value="">— Select a branch —</option>
              ${_bkBranches.map(b=>`<option value="${b.id}" ${bk.branchId===b.id?'selected':''}>${b.name}${b.name_ar?' / '+b.name_ar:''}</option>`).join('')}
            </select>
          </div>` : ''}

          ${_bkProcedures.length === 0 ? `<div class="empty-state" style="padding:24px"><div class="ei" style="font-size:32px">⏳</div><p>${bk.branchId?'Loading services…':'Please select a branch first.'}</p></div>` : `
          <div class="field"><label>Select a Service</label></div>
          <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px">
            ${_bkProcedures.map(p=>`
              <div class="service-card ${bk.procedureId===p.id?'selected':''}" onclick="selectService('${p.id}')">
                <div>
                  <div style="font-weight:700;font-size:14px">${p.name}</div>
                  ${p.name_ar?`<div style="font-size:12px;color:var(--ink3);direction:rtl">${p.name_ar}</div>`:''}
                </div>
                ${p.price>0?`<span class="badge bg-teal">${p.price} ${CURRENCY}</span>`:''}
              </div>
            `).join('')}
          </div>
          <button class="btn btn-primary btn-block" onclick="goStep(2)" ${!bk.procedureId?'disabled':''}>Next: Choose Doctor →</button>
          `}
        </div>
      </div>
    `;
  } else if (bk.step === 2) {
    // ── Step 2: Doctor + Date + Time ──────────────
    await loadBookedSlots();
    content.innerHTML = `
      <div class="card">
        <div class="card-header"><div class="card-title">Choose Doctor, Date & Time</div></div>
        <div class="card-body">
          <div class="field"><label>Choose a Doctor</label></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">
            ${_bkDoctors.length === 0 ? '<p style="color:var(--ink3);font-size:13px">No doctors available.</p>' :
              _bkDoctors.map(d=>`
              <div class="doctor-card ${bk.doctorId===d.id?'selected':''}" onclick="selectDoctor('${d.id}','${d.name}')">
                <div class="av av-blue" style="width:40px;height:40px;font-size:16px">${d.name.slice(0,2).toUpperCase()}</div>
                <div>
                  <div style="font-weight:700;font-size:13px">${d.name}</div>
                  ${d.name_ar?`<div style="font-size:12px;color:var(--ink3)">${d.name_ar}</div>`:''}
                </div>
              </div>
            `).join('')}
          </div>

          <div class="field">
            <label>Date</label>
            <input type="date" id="bkDate" value="${bk.date}" min="${new Date().toISOString().split('T')[0]}"
              onchange="bk.date=this.value;loadBookedSlots().then(()=>renderTimeSlots())">
          </div>

          <label style="font-size:12px;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:10px">Available Time Slots</label>
          <div class="time-grid" id="timeGrid" style="margin-bottom:20px">
            ${renderTimeSlotsHTML()}
          </div>

          <div style="display:flex;gap:10px">
            <button class="btn btn-secondary" onclick="goStep(1)" style="width:auto">← Back</button>
            <button class="btn btn-primary" style="flex:1" onclick="goStep(3)" ${(!bk.doctorId||!bk.time)?'disabled':''}>Next: Your Details →</button>
          </div>
        </div>
      </div>
    `;
  } else if (bk.step === 3) {
    // ── Step 3: Customer details + confirm ─────────
    content.innerHTML = `
      <div class="card">
        <div class="card-header"><div class="card-title">Your Details & Confirmation</div></div>
        <div class="card-body">
          <!-- Booking summary -->
          <div class="confirm-box mb16">
            <div class="confirm-row"><span class="ck">🏥 Branch</span><span class="cv">${bk.branchName||'Clinic'}</span></div>
            <div class="confirm-row"><span class="ck">💆 Service</span><span class="cv">${bk.procedure?.name||'-'}</span></div>
            <div class="confirm-row"><span class="ck">👨‍⚕️ Doctor</span><span class="cv">${bk.doctor?.name||'-'}</span></div>
            <div class="confirm-row"><span class="ck">📅 Date</span><span class="cv">${new Date(bk.date).toLocaleDateString('en',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</span></div>
            <div class="confirm-row"><span class="ck">⏰ Time</span><span class="cv">${formatTime12(bk.time)}</span></div>
          </div>

          <div class="field"><label>Your Full Name *</label>
            <input type="text" id="bkName" value="${bk.customerName}" placeholder="Your full name" autocomplete="name"
              oninput="bk.customerName=this.value"></div>
          <div class="field"><label>Phone Number *</label>
            <div class="input-icon-wrap">
              <span class="input-icon">📞</span>
              <input type="tel" id="bkPhone" value="${bk.customerPhone}" placeholder="+962 7xx xxx xxxx" autocomplete="tel"
                oninput="bk.customerPhone=this.value">
            </div>
          </div>
          <div class="field"><label>Notes (Optional)</label>
            <textarea id="bkNotes" rows="2" placeholder="Any allergies, previous treatments, or requests…" oninput="bk.customerNotes=this.value">${bk.customerNotes}</textarea>
          </div>

          <div class="alert alert-info mb16">
            <span>📞</span>
            <span>We will call you to confirm your appointment. No payment required now.</span>
          </div>

          <div style="display:flex;gap:10px">
            <button class="btn btn-secondary" onclick="goStep(2)" style="width:auto">← Back</button>
            <button class="btn btn-primary" style="flex:1" onclick="submitBooking()">✅ Submit Booking Request</button>
          </div>
        </div>
      </div>
    `;
  }
}

function renderTimeSlotsHTML() {
  return TIME_SLOTS.map(t => {
    const isBooked = _bkBookedSlots.includes(t);
    return `<div class="time-slot ${isBooked?'booked':''} ${bk.time===t?'selected':''}"
      onclick="${isBooked?'':`selectTime('${t}')`}" title="${isBooked?'Already booked':''}">
      ${formatTime12(t)}${isBooked?' 🔒':''}
    </div>`;
  }).join('');
}

async function renderTimeSlots() {
  const grid = document.getElementById('timeGrid');
  if (grid) grid.innerHTML = renderTimeSlotsHTML();
}

// ─── Booking actions ──────────────────────────────
async function selectBranch(branchId) {
  const branch = _bkBranches.find(b=>b.id===branchId);
  bk.branchId   = branchId;
  bk.branchName = branch?.name || '';
  bk.procedureId = null; bk.procedure = null;
  document.getElementById('clinicTitle').textContent = branch?.name || 'Book an Appointment';
  await loadBranchData();
  renderBookStep();
}

function selectService(id) {
  bk.procedureId = id;
  bk.procedure   = _bkProcedures.find(p=>p.id===id);
  renderBookStep();
}

function selectDoctor(id, name) {
  bk.doctorId = id;
  bk.doctor   = _bkDoctors.find(d=>d.id===id);
  bk.time     = null;
  loadBookedSlots().then(() => renderTimeSlots());
  renderBookStep();
}

function selectTime(t) {
  bk.time = t;
  renderTimeSlots();
  // Enable Next button
  const nextBtn = document.querySelector('#bookContent .btn-primary');
  if (nextBtn) nextBtn.disabled = !(bk.doctorId && bk.time);
}

function goStep(n) {
  if (n === 2 && !bk.procedureId) { showToast('warning','Select a Service','Please choose a service first.'); return; }
  if (n === 3 && (!bk.doctorId || !bk.time)) { showToast('warning','Incomplete','Please choose a doctor and time slot.'); return; }
  bk.step = n;
  renderBookStep();
  window.scrollTo({top:0,behavior:'smooth'});
}

async function submitBooking() {
  if (!bk.customerName.trim()) { showToast('error','Name Required','Please enter your full name.'); return; }
  if (!bk.customerPhone.trim()) { showToast('error','Phone Required','Please enter your phone number.'); return; }

  const btn = event.target;
  btn.textContent = 'Submitting…'; btn.disabled = true;

  try {
    await supabase.from('appointments').insert({
      customer_name:  bk.customerName.trim(),
      customer_phone: bk.customerPhone.trim(),
      doctor_id:      bk.doctorId,
      procedure_id:   bk.procedureId,
      date:           bk.date,
      time:           bk.time,
      notes:          bk.customerNotes.trim() || null,
      branch_id:      bk.branchId,
      status:         'pending'
    });

    // Show success screen
    document.getElementById('stepsBar').style.display = 'none';
    document.getElementById('bookContent').innerHTML = `
      <div class="card">
        <div class="card-body success-screen">
          <div class="si">🎉</div>
          <h2>Booking Request Sent!</h2>
          <p>Thank you, <strong>${bk.customerName}</strong>! Your booking request has been received.</p>
          <br>
          <div class="confirm-box" style="text-align:left;margin-top:16px;max-width:340px;margin:16px auto">
            <div class="confirm-row"><span class="ck">Service</span><span class="cv">${bk.procedure?.name}</span></div>
            <div class="confirm-row"><span class="ck">Doctor</span><span class="cv">${bk.doctor?.name}</span></div>
            <div class="confirm-row"><span class="ck">Date</span><span class="cv">${bk.date}</span></div>
            <div class="confirm-row"><span class="ck">Time</span><span class="cv">${formatTime12(bk.time)}</span></div>
          </div>
          <br>
          <p style="font-size:13px;color:var(--ink3)">📞 We will call <strong>${bk.customerPhone}</strong> to confirm your appointment. Please keep your phone nearby!</p>
          <br>
          <button class="btn btn-secondary btn-sm" style="width:auto;margin:0 auto" onclick="location.reload()">📅 Book Another Appointment</button>
        </div>
      </div>
    `;
  } catch (err) {
    showToast('error','Booking Failed', err.message || 'Please try again.');
    btn.textContent = '✅ Submit Booking Request'; btn.disabled = false;
  }
}

// ─── Helpers ─────────────────────────────────────
function formatTime12(time) {
  if (!time) return '';
  const [h, m] = time.split(':').map(Number);
  const ampm = h >= 12 ? 'PM' : 'AM';
  return `${h%12||12}:${String(m).padStart(2,'0')} ${ampm}`;
}

function showToast(type, title, sub) {
  const icons = { success:'✅', error:'❌', info:'ℹ️', warning:'⚠️' };
  const toast = document.createElement('div');
  toast.className = `toast-item ${type}`;
  toast.innerHTML = `<span class="toast-icon">${icons[type]||'📢'}</span><div class="toast-text"><div class="tt">${title}</div>${sub?`<div class="ts">${sub}</div>`:''}</div>`;
  document.getElementById('toastStack').appendChild(toast);
  setTimeout(() => { toast.classList.add('out'); setTimeout(()=>toast.remove(), 350); }, 4000);
}
</script>
</body>
</html>
